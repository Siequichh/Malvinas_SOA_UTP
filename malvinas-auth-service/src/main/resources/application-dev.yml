spring:
  config:
    activate:
      on-profile: dev
  jackson:
    time-zone: America/Bogota

server:
  port: 8086

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

jwt:
  secret: malvinas-dev-secret-key-change-in-production
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

resilience4j:
  circuitbreaker:
    instances:
      personal-service:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.malvinas: DEBUG
    org.springframework.boot.autoconfigure.security: ERROR
