spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: "jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS routes"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: routes
  flyway:
    enabled: false
  sql:
    init:
      mode: never
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
