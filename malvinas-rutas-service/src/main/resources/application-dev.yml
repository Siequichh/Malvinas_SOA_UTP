spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${LOCAL_DB_HOST:localhost}:5432/${LOCAL_DB_NAME:malvinas_db}
    username: ${LOCAL_DB_USERNAME:postgres}
    password: ${LOCAL_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: routes
        format_sql: true
        jdbc:
          time_zone: America/Bogota
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    time-zone: America/Bogota

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

resilience4j:
  circuitbreaker:
    instances:
      vehiculos-service:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      personal-service:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.malvinas: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.boot.autoconfigure.security: ERROR
