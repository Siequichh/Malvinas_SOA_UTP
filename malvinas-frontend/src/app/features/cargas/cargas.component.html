<div>
  <p-toast />
  <p-confirmdialog />

  <div class="page-header">
    <h2 class="page-title">Control de Cargas</h2>
    <div class="page-actions">
      <p-iconfield>
        <p-inputicon class="pi pi-search" />
        <input pInputText placeholder="Buscar vehículo, planta..."
               (input)="dt.filterGlobal($any($event.target).value, 'contains')"
               class="search-input" />
      </p-iconfield>
      @if (['ADM','SUP','MOV'].includes(userRole())) {
        <p-button label="Nueva Carga" icon="pi pi-plus" (onClick)="openCreate()" />
      }
    </div>
  </div>

  <p-table #dt [value]="loads()" [loading]="loading()" [paginator]="true" [rows]="15"
           styleClass="p-datatable-sm" [stripedRows]="true"
           [globalFilterFields]="['vehiclePlate','loadingPlant']">
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Vehículo</th>
        <th>Planta</th>
        <th>Estado</th>
        <th>Inicio</th>
        <th style="width:90px; text-align:center">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-l>
      <tr>
        <td class="mono">#{{ l.id }}</td>
        <td><strong class="mono">{{ l.vehiclePlate }}</strong></td>
        <td>{{ l.loadingPlant }}</td>
        <td>
          <p-tag [value]="getStatusLabel(l.statusCode)" [severity]="getStatusSeverity(l.statusCode)" />
        </td>
        <td>{{ l.loadingStartTime | date:'dd/MM HH:mm' }}</td>
        <td style="text-align:center">
          @if (['ADM','SUP','MOV'].includes(userRole())) {
            <p-button *ngIf="l.statusCode === '02'" icon="pi pi-check" severity="success"
                      size="small" [rounded]="true" [text]="true" title="Completar carga"
                      [disabled]="submitting()" (onClick)="confirmComplete(l)" />
            <p-button *ngIf="l.statusCode === '01' || l.statusCode === '02'" icon="pi pi-times"
                      severity="danger" size="small" [rounded]="true" [text]="true" title="Cancelar carga"
                      [disabled]="submitting()" (onClick)="confirmCancel(l)" />
          }
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="6" class="text-center p-4">No hay registros de carga</td></tr>
    </ng-template>
  </p-table>

  <!-- Nueva Carga Dialog -->
  <p-dialog [visible]="dialogVisible()" (visibleChange)="dialogVisible.set($event)"
            header="Iniciar Proceso de Carga" [modal]="true"
            [resizable]="false" [style]="{ width: '480px' }">
    <div class="flex flex-column gap-3 p-3">
      <div class="flex flex-column gap-2">
        <label>Vehículo Disponible *</label>
        <p-select [options]="availableVehicles()" optionLabel="licensePlate" optionValue="licensePlate"
                  [ngModel]="form().vehiclePlate" (ngModelChange)="updateForm('vehiclePlate', $event)"
                  placeholder="Seleccionar vehículo" styleClass="w-full" />
      </div>
      <div class="flex flex-column gap-2">
        <label>Movilizador *</label>
        <p-select [options]="mobilizers()" optionLabel="fullName" optionValue="id"
                  [ngModel]="form().mobilizerId" (ngModelChange)="updateForm('mobilizerId', $event)"
                  placeholder="Seleccionar movilizador" styleClass="w-full" />
      </div>
      <div class="flex flex-column gap-2">
        <label>Planta de Carga</label>
        <input pInputText [ngModel]="form().loadingPlant"
               (ngModelChange)="updateForm('loadingPlant', $event)" />
      </div>
      <div class="flex flex-column gap-2">
        <label>Observaciones</label>
        <textarea pTextarea [ngModel]="form().remarks"
                  (ngModelChange)="updateForm('remarks', $event)" rows="3"></textarea>
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancelar" severity="secondary" (onClick)="dialogVisible.set(false)" />
      <p-button label="Iniciar Carga" icon="pi pi-play" [loading]="submitting()" [disabled]="submitting()" (onClick)="saveLoad()" />
    </ng-template>
  </p-dialog>
</div>
