<div>
  <p-toast />
  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="text-2xl font-bold m-0">Gestion de Vehiculos</h2>
    <p-button label="Nuevo Vehiculo" icon="pi pi-plus" (onClick)="openCreate()" />
  </div>

  <p-table [value]="vehicles()" [loading]="loading()" [paginator]="true" [rows]="15"
           styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Placa</th>
        <th>Tipo</th>
        <th>Marca/Modelo</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-v>
      <tr>
        <td><strong>{{ v.licensePlate }}</strong></td>
        <td>{{ v.vehicleTypeName }}</td>
        <td>{{ v.brand }} {{ v.model }} {{ v.year }}</td>
        <td>
          <p-tag [value]="v.statusDisplay" [severity]="getStatusSeverity(v.statusCode)" />
        </td>
        <td>
          <p-button icon="pi pi-pencil" severity="secondary" size="small" [rounded]="true" [text]="true" (onClick)="openEdit(v)" />
          <p-button icon="pi pi-refresh" severity="warn" size="small" [rounded]="true" [text]="true" (onClick)="openStatusChange(v)" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="5" class="text-center p-4">No hay vehiculos registrados</td></tr>
    </ng-template>
  </p-table>

  <!-- Create/Edit Dialog -->
  <p-dialog [visible]="dialogVisible()" (visibleChange)="dialogVisible.set($event)"
            [header]="editMode() ? 'Editar Vehiculo' : 'Nuevo Vehiculo'"
            [modal]="true" [style]="{ width: '500px' }">
    <div class="flex flex-column gap-3 p-3">
      <div class="flex flex-column gap-2">
        <label>Placa *</label>
        <input pInputText [ngModel]="form().licensePlate" (ngModelChange)="updateForm('licensePlate', $event)"
               [disabled]="editMode()" placeholder="ABC-123" />
      </div>
      <div class="flex flex-column gap-2">
        <label>Tipo *</label>
        <p-select [options]="vehicleTypes()" optionLabel="name" optionValue="id"
                  [ngModel]="form().vehicleTypeId" (ngModelChange)="updateForm('vehicleTypeId', $event)"
                  placeholder="Seleccionar tipo" styleClass="w-full" />
      </div>
      <div class="grid">
        <div class="col-6 flex flex-column gap-2">
          <label>Marca</label>
          <input pInputText [ngModel]="form().brand" (ngModelChange)="updateForm('brand', $event)" />
        </div>
        <div class="col-6 flex flex-column gap-2">
          <label>Modelo</label>
          <input pInputText [ngModel]="form().model" (ngModelChange)="updateForm('model', $event)" />
        </div>
      </div>
      <div class="grid">
        <div class="col-6 flex flex-column gap-2">
          <label>Año</label>
          <input pInputText type="number" [ngModel]="form().year" (ngModelChange)="updateForm('year', +$event)" />
        </div>
        <div class="col-6 flex flex-column gap-2">
          <label>Color</label>
          <input pInputText [ngModel]="form().color" (ngModelChange)="updateForm('color', $event)" />
        </div>
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancelar" severity="secondary" (onClick)="dialogVisible.set(false)" />
      <p-button label="Guardar" (onClick)="saveVehicle()" />
    </ng-template>
  </p-dialog>

  <!-- Status Change Dialog -->
  <p-dialog [visible]="statusDialogVisible()" (visibleChange)="statusDialogVisible.set($event)"
            header="Cambiar Estado" [modal]="true" [style]="{ width: '400px' }">
    <div class="flex flex-column gap-3 p-3">
      <p>Vehiculo: <strong>{{ selectedVehicle()?.licensePlate }}</strong></p>
      <p>Estado actual: <p-tag [value]="selectedVehicle()?.statusDisplay" /></p>
      <div class="flex flex-column gap-2">
        <label>Nuevo Estado *</label>
        <p-select [options]="statusOptions" optionLabel="label" optionValue="value"
                  [ngModel]="statusForm().newStatusCode" (ngModelChange)="updateStatusForm('newStatusCode', $event)"
                  placeholder="Seleccionar estado" styleClass="w-full" />
      </div>
      <div class="flex flex-column gap-2">
        <label>Motivo</label>
        <input pInputText [ngModel]="statusForm().reason" (ngModelChange)="updateStatusForm('reason', $event)" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancelar" severity="secondary" (onClick)="statusDialogVisible.set(false)" />
      <p-button label="Cambiar" severity="warn" (onClick)="changeStatus()" />
    </ng-template>
  </p-dialog>
</div>
