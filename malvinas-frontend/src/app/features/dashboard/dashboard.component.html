<div>
  <h2 class="text-2xl font-bold mb-4" style="color: var(--p-text-color)">Dashboard</h2>

  @if (loading()) {
    <div class="grid">
      @for (i of [1,2,3,4]; track i) {
        <div class="col-12 md:col-6 lg:col-3">
          <p-skeleton height="120px" styleClass="mb-2" />
        </div>
      }
    </div>
  } @else {
    <!-- KPI Cards -->
    <div class="grid mb-4">
      @for (kpi of kpis(); track kpi.name) {
        <div class="col-12 md:col-6 lg:col-2">
          <div class="card text-center">
            <p class="text-sm mb-1" style="color: var(--p-text-muted-color)">{{ kpi.name }}</p>
            <p class="text-3xl font-bold m-0" style="color: var(--p-primary-color)">{{ kpi.value ?? '-' }}</p>
            <p class="text-xs mt-1" style="color: var(--p-text-muted-color)">{{ kpi.unit }}</p>
          </div>
        </div>
      }
    </div>

    <!-- Charts -->
    <div class="grid">
      <div class="col-12 md:col-6">
        <p-card header="Vehículos por Estado">
          @if (chartData()) {
            <p-chart type="doughnut" [data]="chartData()" [style]="{ height: '280px' }" />
          } @else {
            <p style="color: var(--p-text-muted-color)">Sin datos disponibles</p>
          }
        </p-card>
      </div>
      <div class="col-12 md:col-6">
        <p-card header="Resumen Operacional">
          <div class="flex flex-column gap-3">
            <div class="flex justify-content-between align-items-center">
              <span style="color: var(--p-text-color)">Total Vehículos</span>
              <p-tag [value]="(dashboard()?.totalVehicles ?? '-').toString()" severity="info" />
            </div>
            <div class="flex justify-content-between align-items-center">
              <span style="color: var(--p-text-color)">Disponibles</span>
              <p-tag [value]="(dashboard()?.availableVehicles ?? '-').toString()" severity="success" />
            </div>
            <div class="flex justify-content-between align-items-center">
              <span style="color: var(--p-text-color)">En Ruta</span>
              <p-tag [value]="(dashboard()?.vehiclesOnRoute ?? '-').toString()" severity="warning" />
            </div>
            <div class="flex justify-content-between align-items-center">
              <span style="color: var(--p-text-color)">Utilización Flota</span>
              <p-tag
                [value]="dashboard()?.fleetUtilizationPercent != null
                  ? dashboard()!.fleetUtilizationPercent.toFixed(1) + '%'
                  : '-'"
                severity="primary"
              />
            </div>
          </div>
        </p-card>
      </div>
    </div>
  }
</div>
