<div>
  <p-toast />
  <div class="page-header">
    <h2 class="page-title">Gestión de Personal</h2>
    <div class="page-actions">
      <p-iconfield>
        <p-inputicon class="pi pi-search" />
        <input pInputText placeholder="Buscar DNI, nombre..."
               (input)="dt.filterGlobal($any($event.target).value, 'contains')"
               class="search-input" />
      </p-iconfield>
      @if (userRole() === 'ADM') {
        <p-button label="Nuevo Empleado" icon="pi pi-plus" (onClick)="openCreate()" />
      }
    </div>
  </div>

  <p-table #dt [value]="employees()" [loading]="loading()" [paginator]="true" [rows]="15"
           styleClass="p-datatable-sm" [stripedRows]="true"
           [globalFilterFields]="['dni','firstName','lastName','email']">
    <ng-template pTemplate="header">
      <tr>
        <th>DNI</th>
        <th>Nombre</th>
        <th>Rol</th>
        <th>Email</th>
        <th>Estado</th>
        <th style="width:70px; text-align:center">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-emp>
      <tr>
        <td class="mono">{{ emp.dni }}</td>
        <td>{{ emp.firstName }} {{ emp.lastName }}</td>
        <td><p-tag [value]="emp.roleCode || emp.role?.code" severity="info" /></td>
        <td>{{ emp.email }}</td>
        <td><p-tag [value]="emp.isActive ? 'Activo' : 'Inactivo'" [severity]="emp.isActive ? 'success' : 'danger'" /></td>
        <td style="text-align:center">
          @if (userRole() === 'ADM') {
            <p-button icon="pi pi-pencil" severity="secondary" size="small" [rounded]="true" [text]="true" (onClick)="openEdit(emp)" />
          }
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="6" class="text-center p-4">No hay empleados registrados</td></tr>
    </ng-template>
  </p-table>

  <p-dialog [visible]="dialogVisible()" (visibleChange)="dialogVisible.set($event)"
            [header]="editMode() ? 'Editar Empleado' : 'Nuevo Empleado'"
            [modal]="true" [resizable]="false" [style]="{ width: '500px' }">
    <div class="flex flex-column gap-3 p-3">
      <div class="grid">
        <div class="col-6 flex flex-column gap-2">
          <label>DNI *</label>
          <input pInputText [ngModel]="form().dni" (ngModelChange)="updateForm('dni', $event)" [disabled]="editMode()" />
        </div>
        <div class="col-6 flex flex-column gap-2">
          <label>Rol *</label>
          <p-select [options]="roles()" optionLabel="name" optionValue="id"
                    [ngModel]="form().roleId" (ngModelChange)="updateForm('roleId', $event)"
                    placeholder="Seleccionar rol" styleClass="w-full" />
        </div>
      </div>
      <div class="grid">
        <div class="col-6 flex flex-column gap-2">
          <label>Nombres *</label>
          <input pInputText [ngModel]="form().firstName" (ngModelChange)="updateForm('firstName', $event)" />
        </div>
        <div class="col-6 flex flex-column gap-2">
          <label>Apellidos *</label>
          <input pInputText [ngModel]="form().lastName" (ngModelChange)="updateForm('lastName', $event)" />
        </div>
      </div>
      <div class="flex flex-column gap-2">
        <label>Email</label>
        <input pInputText type="email" [ngModel]="form().email" (ngModelChange)="updateForm('email', $event)" />
      </div>
      @if (!editMode()) {
        <div class="flex flex-column gap-2">
          <label>Contraseña *</label>
          <input pInputText type="password" [ngModel]="form().password" (ngModelChange)="updateForm('password', $event)" />
        </div>
      }
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancelar" severity="secondary" (onClick)="dialogVisible.set(false)" />
      <p-button label="Guardar" [loading]="submitting()" [disabled]="submitting()" (onClick)="saveEmployee()" />
    </ng-template>
  </p-dialog>
</div>
