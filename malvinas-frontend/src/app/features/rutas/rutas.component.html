<div>
  <p-toast />
  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="text-2xl font-bold m-0">Rutas y Despacho</h2>
    <p-button label="Nuevo Despacho" icon="pi pi-plus" (onClick)="openCreate()" />
  </div>

  <p-table [value]="dispatches()" [loading]="loading()" [paginator]="true" [rows]="15"
           styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Orden de Carga</th>
        <th>Vehiculo</th>
        <th>Conductor</th>
        <th>Estado</th>
        <th>Salida Prog.</th>
        <th>Salida Real</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-d>
      <tr>
        <td><strong>{{ d.loadingOrderCode || '-' }}</strong></td>
        <td>{{ d.vehiclePlate }}</td>
        <td>{{ d.driverName }}</td>
        <td>
          <p-tag [value]="getStatusLabel(d.statusCode)" [severity]="getStatusSeverity(d.statusCode)" />
        </td>
        <td>{{ d.scheduledDepartureTime }}</td>
        <td>{{ d.actualDepartureTime | date:'dd/MM HH:mm' }}</td>
        <td>
          <p-button *ngIf="d.statusCode === '01'" icon="pi pi-send" severity="warn"
                    size="small" [rounded]="true" [text]="true" title="Registrar salida"
                    (onClick)="registerDeparture(d)" />
          <p-button *ngIf="d.statusCode === '02'" icon="pi pi-home" severity="success"
                    size="small" [rounded]="true" [text]="true" title="Cerrar ruta"
                    (onClick)="completeDispatch(d)" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="7" class="text-center p-4">No hay despachos registrados</td></tr>
    </ng-template>
  </p-table>

  <!-- Nuevo Despacho Dialog -->
  <p-dialog [visible]="dialogVisible()" (visibleChange)="dialogVisible.set($event)"
            header="Programar Despacho" [modal]="true" [style]="{ width: '520px' }">
    <div class="flex flex-column gap-3 p-3">
      <div class="flex flex-column gap-2">
        <label>Placa del Vehiculo *</label>
        <input pInputText [ngModel]="form().vehiclePlate"
               (ngModelChange)="updateForm('vehiclePlate', $event)"
               placeholder="ABC-123" />
      </div>
      <div class="flex flex-column gap-2">
        <label>ID del Conductor *</label>
        <input pInputText type="number" [ngModel]="form().driverId"
               (ngModelChange)="updateForm('driverId', +$event)"
               placeholder="ID del empleado conductor" />
      </div>
      <div class="flex flex-column gap-2">
        <label>Hora de Salida Programada</label>
        <input pInputText type="time" [ngModel]="form().scheduledDepartureTime"
               (ngModelChange)="updateForm('scheduledDepartureTime', $event)" />
      </div>
      <div class="flex flex-column gap-2">
        <label>Observaciones</label>
        <textarea pTextarea [ngModel]="form().remarks"
                  (ngModelChange)="updateForm('remarks', $event)" rows="3"></textarea>
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancelar" severity="secondary" (onClick)="dialogVisible.set(false)" />
      <p-button label="Programar" icon="pi pi-calendar" (onClick)="saveDispatch()" />
    </ng-template>
  </p-dialog>
</div>
